<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h2 id="titulo">Estudando elementos de Formulários</h2>

    <form>
        <label for="nome">Primeiro nome:</label>
        <br><input type="text" name="nome">
        <br><br><label for="sobrenome">Segundo nome</label>
        <br><input type="text" name="sobrenome">

        <br><br><input type="submit" value="Enviar!">
    </form>

    <br><h2>Input tipo Radio</h2>
    <form>
        <input type="radio" name="idade" value="16">
        <label for="idade">16 anos</label>
        <br><input type="radio" name="idade" value="17">
        <label for="idade">17 anos</label>
        <br><input type="radio" name="idade" value="18">
        <label for="idade">18 anos</label>
    </form>

    <br><h2>Input do tipo checkbox</h2>
    <form >
        <input type="checkbox" name="veiculo" value="Bicicleta">
        <label for="veiculo">Eu tenho uma Bicicleta</label>
        <br><input type="checkbox" name="veiculo" value="Moto">
        <label for="veiculo">Eu tenho uma moto</label>
        <br><input type="checkbox" name="veiculo" value="Carro">
        <label for="veiculo">Eu tenho um carro</label>
    </form>

    <h2>Outros tipos de input</h2>
    <form>
        <input type="date"><br><br>
        <input type="color" name="" id=""><br><br>
        <input type="file"><br><br>
        <input type="password"><br><br>
        <input type="range">
    </form>
</body>
</html>
